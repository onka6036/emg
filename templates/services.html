{% extends 'base.html' %}
{% block title %}Services{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <h1 class="section-title">Services</h1>
    <div class="grid cards-3">
      {% for service in services %}
      <div class="card">
        <h3>{{ service.name }}</h3>
        <p>{{ service.description }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
