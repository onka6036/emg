{% extends 'base.html' %}
{% block title %}Blog{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <h1 class="section-title">Blog</h1>
    <div class="grid cards-3">
      {% for post in posts %}
      <div class="card">
        <h3>{{ post.title }}</h3>
        <p>{{ post.content[:180] }}...</p>
        <a href="{{ url_for('blog_post', slug=post.slug) }}">Continue Reading</a>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
