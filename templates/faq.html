{% extends 'base.html' %}
{% block title %}FAQ{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <h1 class="section-title">Frequently Asked Questions</h1>
    <div class="grid cards-2">
      {% for item in items %}
      <div class="card">
        <h3>{{ item.question }}</h3>
        <p>{{ item.answer }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
